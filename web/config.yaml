# FR5V6 Robotic Arm Web Documentation Config

site:
  title: "FR5V6 Technical Documentation"
  subtitle: "FPT University, Cantho Campus — Vietnam IoT & AI Lab"
  description: "Technical specifications and kinematics documentation for the Fairino FR5-V6.0 robotic arm"

# Robot Specifications (sourced from encycam.com)
robot:
  brand: "FAIRINO"
  model: "FR5-V6.0"
  type: "Cobot (Collaborative Robot)"
  axes: 6
  payload_kg: 5
  reach_mm: 922
  repeatability_mm: 0.02
  weight_kg: 22
  max_speed_mps: 1.0
  ip_rating: "IP54 (IP65 optional)"
  operating_temp_c: "0-45"
  mount: "Any orientation"

controller:
  type: "Self-developed real-time motor/control system"
  interface: "Teach pendant or web app"
  power_supply: "30-60 VDC"
  power_consumption_w: 260

tool_flange:
  pattern: "4 × M6 threaded holes"

safety:
  certifications: ["CR", "CE", "ISO 9001", "ISO 10218", "TS 15066"]
  features: ["Collaborative safety", "Emergency stop", "Safety inputs/outputs"]

communication:
  interfaces: ["TCP/IP", "Modbus TCP/RTU"]
  optional: ["CC-Link", "Profinet", "EtherNet/IP", "EtherCAT"]

applications:
  primary: ["Deburring", "Multiaxis cutting", "Polishing", "Robot milling", "Trimming"]

# Design tokens
design:
  colors:
    primary_bg: "#0D1117"
    secondary_bg: "#161B22"
    tertiary_bg: "#21262D"
    border: "#30363D"
    accent_amber: "#F0883E"
    accent_cyan: "#58A6FF"
    accent_green: "#3FB950"
    text_primary: "#E6EDF3"
    text_secondary: "#8B949E"
    text_muted: "#6E7681"
  
  typography:
    display: "JetBrains Mono, monospace"
    body: "IBM Plex Sans, sans-serif"
    scale:
      hero: "3.5rem"
      h1: "2.5rem"
      h2: "1.75rem"
      h3: "1.25rem"
      body: "1rem"
      small: "0.875rem"
      caption: "0.75rem"
  
  spacing:
    unit: "8px"
    section_padding: "80px"
    container_max: "1200px"

# Navigation
nav:
  items:
    - id: "specs"
      label: "Technical Specs"
      href: "index.html"
    - id: "kinematics"
      label: "Kinematics"
      href: "kinematics.html"

# Image requirements
images:
  fr5_diagrams:
    - name: "fr5_front_view.png"
      description: "Front elevation view of FR5-V6.0 cobot showing all 6 joints labeled J1-J6"
      dimensions: "1200x800px"
      priority: 1
    - name: "fr5_side_view.png"
      description: "Side view with dimension annotations showing reach and height envelope"
      dimensions: "1200x800px"
      priority: 1
    - name: "fr5_joint_ranges.png"
      description: "Diagram showing maximum rotation ranges for each joint axis"
      dimensions: "1000x600px"
      priority: 2
    - name: "fr5_workspace.png"
      description: "Top-down view of the robot's reachable workspace envelope"
      dimensions: "800x800px"
      priority: 2
    - name: "fr5_tool_flange.png"
      description: "Detail drawing of tool flange mounting pattern (4x M6 holes)"
      dimensions: "600x600px"
      priority: 3
    - name: "fr5_dh_parameters.png"
      description: "Denavit-Hartenberg parameter diagram for the 6-axis arm"
      dimensions: "1400x600px"
      priority: 1

  kinematics:
    - name: "coordinate_frames.png"
      description: "6-DOF arm with coordinate frames attached at each joint per DH convention"
      dimensions: "1200x800px"
      priority: 1
    - name: "forward_kinematics_chain.png"
      description: "Schematic showing how joint angles propagate to end-effector pose"
      dimensions: "1000x500px"
      priority: 1
    - name: "dh_table_visual.png"
      description: "Visual representation of the DH parameter table as annotated diagram"
      dimensions: "800x400px"
      priority: 2
    - name: "jacobian_matrix.png"
      description: "The 6x6 Jacobian matrix visualization for velocity mapping"
      dimensions: "600x400px"
      priority: 2
    - name: "inverse_kinematics_solution.png"
      description: "Geometric interpretation of IK solutions showing elbow-up/elbow-down configurations"
      dimensions: "1000x700px"
      priority: 1
    - name: "workspace_slice.png"
      description: "2D cross-section of the 3D reachable workspace at a given height"
      dimensions: "800x600px"
      priority: 2

# Kinematics parameters (FR5-V6.0 approximate DH parameters)
kinematics:
  dh_parameters:
    link1:
      theta: 0
      d: 168
      a: 0
      alpha: 0
    link2:
      theta: 0
      d: 0
      a: 260
      alpha: 90
    link3:
      theta: 0
      d: 0
      a: 260
      alpha: 0
    link4:
      theta: 0
      d: 105
      a: 0
      alpha: 90
    link5:
      theta: 0
      d: 0
      a: 0
      alpha: -90
    link6:
      theta: 0
      d: 105
      a: 0
      alpha: 0
  
  joint_ranges:
    j1: [-175, 175]  # degrees
    j2: [-130, 130]
    j3: [-135, 135]
    j4: [-175, 175]
    j5: [-105, 105]
    j6: [-360, 360]
  
  max_joint_speeds:
    j1: 120  # deg/s
    j2: 120
    j3: 120
    j4: 180
    j5: 180
    j6: 360